services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: mymemory
      POSTGRES_USER: mymemory
      POSTGRES_PASSWORD: mymemory
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mymemory"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://mymemory:mymemory@postgres:5432/mymemory
      NODE_ENV: production
      PORT: 3001
      OLLAMA_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:3001
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
