services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mymemory
      POSTGRES_USER: mymemory
      POSTGRES_PASSWORD: mymemory
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mymemory"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://mymemory:mymemory@postgres:5432/mymemory
      NODE_ENV: production
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:3001}
      NODE_ENV: production
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
